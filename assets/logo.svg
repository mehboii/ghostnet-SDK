<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ghostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0f172a" stroke="url(#ghostGrad)" stroke-width="3"/>
  <!-- Ghost body -->
  <path d="M100 40 C65 40 45 70 45 100 L45 145 L60 135 L75 145 L90 135 L105 145 L120 135 L135 145 L155 145 L155 100 C155 70 135 40 100 40Z" fill="url(#ghostGrad)" opacity="0.9" filter="url(#glow)"/>
  <!-- Eyes -->
  <circle cx="80" cy="85" r="10" fill="#0f172a"/>
  <circle cx="120" cy="85" r="10" fill="#0f172a"/>
  <circle cx="83" cy="83" r="4" fill="#e0e7ff"/>
  <circle cx="123" cy="83" r="4" fill="#e0e7ff"/>
  <!-- Network lines -->
  <line x1="55" y1="110" x2="30" y2="95" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <circle cx="30" cy="95" r="3" fill="#6366f1" opacity="0.6"/>
  <line x1="145" y1="110" x2="170" y2="95" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="170" cy="95" r="3" fill="#8b5cf6" opacity="0.6"/>
  <line x1="100" y1="55" x2="100" y2="25" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="25" r="3" fill="#6366f1" opacity="0.6"/>
  <!-- Lock icon -->
  <rect x="90" y="105" width="20" height="15" rx="2" fill="#0f172a" opacity="0.8"/>
  <path d="M95 105 L95 98 C95 93 105 93 105 98 L105 105" fill="none" stroke="#0f172a" stroke-width="2.5" opacity="0.8"/>
  <circle cx="100" cy="112" r="2" fill="#e0e7ff"/>
</svg>
